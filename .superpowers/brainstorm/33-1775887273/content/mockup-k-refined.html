<!--
  K REFINED — viewBox 0 0 1200 640 (2× K's original 600×320)
  All coordinates doubled from K Final. Physics corrections applied.

  S3 stage capture @ d=10µm, Q=13.5 L/min, fouling=0.18:
    base  = clip((10/5)^0.8, 0, 0.97) = clip(1.741, 0, 0.97) = 0.97
    flow  = exp(-0.04 × (13.5-10))    = exp(-0.14)           = 0.869
    foul  = 1 + 0.10 × 0.18           = 1.018
    η_s3  = clip(0.97 × 0.869 × 1.018, 0, 0.97) = clip(0.858, 0, 0.97) = 85.8%

  η_system(clean ref @ 10µm, 13.5L/min) = η_nominal = 85.4%  ← η_ref
  η_live   = 71.2%  (degraded — compound of flow penalty + fouling)
  Δη       = −14.2 pts  cause: FLOW
-->
<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<defs>
  <radialGradient id="kBg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#081828"/><stop offset="100%" stop-color="#010306"/>

  <!-- S1/S2 cap — muted (low capture) -->
  <linearGradient id="kCapS12" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2A4878"/><stop offset="50%" stop-color="#112040"/><stop offset="100%" stop-color="#060E20"/>
  </linearGradient>
  <!-- S3 cap — brighter (dominant capture) -->
  <linearGradient id="kCapS3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4A78B0"/><stop offset="50%" stop-color="#1E3868"/><stop offset="100%" stop-color="#0A1830"/>
  </linearGradient>
  <!-- S1 cylinder — darkest, minimal energy -->
  <radialGradient id="kCylS1" cx="60%" cy="24%" r="58%">
    <stop offset="0%" stop-color="#1A3050" stop-opacity="1"/>
    <stop offset="50%" stop-color="#080E20" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#030608" stop-opacity="1"/>
  </radialGradient>
  <!-- S2 cylinder — mid -->
  <radialGradient id="kCylS2" cx="60%" cy="24%" r="58%">
    <stop offset="0%" stop-color="#243860" stop-opacity="1"/>
    <stop offset="50%" stop-color="#0C1428" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#040810" stop-opacity="1"/>
  </radialGradient>
  <!-- S3 cylinder — full K brightness (dominant) -->
  <radialGradient id="kCylS3" cx="60%" cy="24%" r="58%">
    <stop offset="0%" stop-color="#305888" stop-opacity="1"/>
    <stop offset="50%" stop-color="#0E1E38" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#040810" stop-opacity="1"/>
  </radialGradient>
  <linearGradient id="kPipe" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020406"/>
    <stop offset="42%" stop-color="#1E3868"/>
    <stop offset="50%" stop-color="#38BDF822"/>
    <stop offset="58%" stop-color="#1E3868"/>
    <stop offset="100%" stop-color="#020406"/>
  </linearGradient>
  <linearGradient id="kResv" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#081E16"/><stop offset="100%" stop-color="#020C08"/>
  </linearGradient>
  <!-- Buoyant pass-through — cool slate tone, not red -->
  <linearGradient id="buoyant" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
    <stop offset="50%" stop-color="#7DD3F0" stop-opacity=".18"/>
    <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
  </linearGradient>

  <filter id="kGlow"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kNodeS3"><feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kNodeS12"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kManifold"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kResvGlow"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kEField"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="kBlur"><feGaussianBlur stdDeviation="2.8"/></filter>
  <filter id="etaGlow"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="s3dominance"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
