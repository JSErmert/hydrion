# HydrOS Validation Protocol v2 — Recovery Latency config
# Disturb then measure steps until metric returns within threshold

recovery_latency:
  seed: 0
  disturbance:
    type: action_hold
    steps: 30
    action: [0.15, 0.85, 0.0, 0.5]
  recovery:
    metric: flow
    target: 0.5
    threshold: 0.15
    max_steps: 400
  post_disturbance_action: [0.5, 0.5, 0.0, 0.5]
