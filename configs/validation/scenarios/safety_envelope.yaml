# HydrOS Validation Protocol v2 — Safety envelope scenario
# Stress within expected safety envelope (pressure, clog, flow)

name: safety_envelope
description: Action sweep within safety bounds
seed: 10
steps_per_action: 5
grid:
  valve: [0.25, 0.75, 3]
  pump: [0.4, 0.8, 3]
  backflush: [0.0, 0.2, 2]
  node_voltage: [0.4, 0.6, 2]
bounds:
  flow: [0.0, 1.0]
  pressure: [0.0, 1.0]
  clog: [0.0, 1.0]
  obs_all: [0.0, 1.0]
fail_on_nan: true
